<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Clientes e Pedidos API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topo">
    <div>
        <h1>Clientes & Pedidos</h1>
        <p>Front-end simples consumindo API REST com Spring Boot</p>
    </div>
</header>

<main class="container">

    <section class="card">
        <div class="card-header">
            <h2>Clientes</h2>
            <button onclick="listarClientes()">Atualizar lista</button>
        </div>

        <div class="form-grid">
            <input id="clienteId" type="number" placeholder="ID para buscar, editar ou deletar">
            <input id="clienteNome" type="text" placeholder="Nome">
            <input id="clienteEmail" type="email" placeholder="Email">
            <input id="clienteTelefone" type="text" placeholder="Telefone">
        </div>

        <div class="actions">
            <button onclick="criarCliente()">Cadastrar</button>
            <button onclick="buscarClientePorId()">Buscar</button>
            <button onclick="atualizarCliente()">Atualizar</button>
            <button class="danger" onclick="deletarCliente()">Deletar</button>
        </div>

        <div id="listaClientes" class="lista"></div>
    </section>

    <section class="card">
        <div class="card-header">
            <h2>Pedidos</h2>
            <button onclick="listarPedidos()">Atualizar lista</button>
        </div>

        <div class="form-grid">
            <input id="pedidoId" type="number" placeholder="ID do pedido">
            <input id="pedidoClienteId" type="number" placeholder="ID do cliente">
            <input id="pedidoDescricao" type="text" placeholder="Descrição">
            <input id="pedidoValor" type="number" step="0.01" placeholder="Valor">
        </div>

        <div class="actions">
            <button onclick="criarPedido()">Cadastrar</button>
            <button onclick="buscarPedidoPorId()">Buscar</button>
            <button onclick="atualizarPedido()">Atualizar</button>
            <button class="danger" onclick="deletarPedido()">Deletar</button>
        </div>

        <div id="listaPedidos" class="lista"></div>
    </section>

</main>

<div id="mensagem" class="mensagem"></div>

<script src="script.js"></script>
</body>
</html>
